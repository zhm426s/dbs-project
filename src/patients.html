<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hospital MS- Patients</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <!--Functions: add patient, search patients (w filters), edit patient info, remove patient, view treatment history, set insurance, change insurance, remove insurance-->
    <body>
        <header>
            <h1>Patient Directory</h1>
            <button class="directory-button" onclick="location.href='index.html';">Back to Home</button>
        </header>
        <main>
            <div id="search-form">
                <form methord="post">
                    <p>Search: </p>
                    <div class="search-field">
                        <label for="ssn">SSN:</label><br>
                        <input type="password" id="ssn" name="ssn">
                    </div>
                    <div class="search-field">
                        <label for="Name">Name:</label><br>
                        <input type="text" id="name" name="name" value="e.g. John, Doe, John Doe">
                    </div>
                    <div class="search-field">
                        <label for="dob">Date of Birth:</label><br>
                        <input type="date" id="dob" name="dob">
                    </div>
                    <div class="search-field">
                        <label for="email">Email Address:</label><br>
                        <input type="text" id="email" name="email" value=" e.g.johndoe@example.org">
                    </div>
                    <div class="search-field">
                        <label for="phone">Phone #:</label><br>
                        <input type="text" id="phone" name="phone" value="e.g. 555-555-5555">
                    </div>
                    <input type="submit" value="Search">
                </form>
            </div>
            <div id="filter-form">
                <form method="post">
                    <p>Filter: </p>
                    <div class="filter-field">
                        <label for="condition">Condition:</label><br>
                        <input type="text" id="condition" name="condition" value="e.g. Fever">
                    </div>   
                    <div class="filter-field">
                        <label for="minAge">Minimum Age:</label><br>
                        <input type="number" id="minAge" name="minAge" min="0" max="110">
                    </div>
                    <div class="filter-field">
                        <label for="maxAge">Maximum Age:</label><br>
                        <input type="number" id="maxAge" name="maxAge" min="0" max="110">
                    </div>
                    <div class="filter-field">
                        <label for="sex">Biological Sex:</label><br>
                        <select id="sex" name="sex">
                            <option value="m">Male</option>
                            <option value="f">Female</option>
                            <option value="x">Intersex</option>
                        </select>
                    </div>
                    <div class="filter-field">
                        <label for="insurer">Insurance Provider:</label><br>
                        <input type="text" id="insurer" name="insurer" value="e.g. Aetna">
                    </div>       
                    <input type="submit" value="Filter">
                </form>
            </div>
            <div id="results">
                <p>Results: </p>
                <table id="results-table">
                    <tr>
                        <th>Name</th>
                        <th>Conditions</th>
                        <th>Currently Staying?</th> <!--Room number, or No-->
                        <th>Date of Birth</th>
                        <th>Sex</th>
                        <th>Email Address</th>
                        <th>Phone Number</th>
                        <th>Insurance</th> <!--Provider, Plan-->
                        <th class="treatments">View Treatments</th> <!--for treatments button-->
                        <th class="update">Update</th> <!--for update button-->
                        <th class="delete">Delete</th> <!--for delete button-->
                    </tr>
                    <!--organization of a single row (to be revised when interaction is added)-->
                    <tr>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="treatments"><button class="ptreatment-button">View Treatments</button></td>
                        <td class="update"><button class="update-button">Update</button></td>
                        <td class="delete"><button class="delete-button">Delete</button></td>
                    </tr>
                </table>
            </div>
        </main>
    </body>
</html>
