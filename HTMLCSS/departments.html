<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hospital MS- Departments</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <!--Functions: view departments, remove department-->
    <body>
        <header>
            <h1>Department Directory</h1>
            <button class="directory-button" onclick="location.href='index.html';">Back to Home</button>
        </header>
        <main>
            <!--for adding a new dept-->
            <button class="add-button" onclick="location.href='departmentform.html';">Add Department</button>
            <div id="search-form">
                <form method="post">
                    <p>Search: </p>
                    <div class="search-field">
                        <label for="name">Dept Name:</label><br>
                        <input type="text" id="name" name="name" placeholder="e.g. Primary Care">
                    </div>
                    <input type="submit" value="Search">
                    <input type="reset" value="Clear Search">
                </form>
            </div>
            <div id="filter-form">
                <form method="post">
                    <p>Filter: </p>
                    <div class="filter-field">
                        <label for="building">Building:</label><br>
                        <input type="text" id="building" name="building" placeholder="e.g. Main Building">
                    </div>          
                    <input type="submit" value="Filter">
                    <input type="reset" value="Clear Filter">
                </form>
            </div>
            <div id="results">
                <p>Results: </p>
                <table id="results-table">
                    <tr>
                        <th>ID</th>
                        <th>Department Name</th>
                        <th>Building</th> 
                        <th>Floors</th>
                        <th class="update">Update</th> <!--for update button-->
                        <th class="delete">Delete</th> <!--for delete button-->
                    </tr>
                    <!--organization of a single row (to be revised when interaction is added)-->
                    <tr>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="update"><button class="update-button" onclick="location.href='departmentform.html';">Update</button></td>
                        <td class="delete"><button class="delete-button">Delete</button></td>
                    </tr>
                </table>
            </div>
        </main>
    </body>
</html>
