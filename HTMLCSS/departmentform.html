<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hospital MS- Department Form</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <!--Functions: add department, edit dept info-->
    <body>
        <header>
            <h1>Enter Department Information</h1>
            <button class="directory-button" onclick="location.href='departments.html';">Back to Departments Directory</button>
        </header>
        <main>
            <div id="edit-form">
                <form class="edit" method="post">
                    <div class="edit-field">
                        <label for="new">Is this a new department?:</label><br>
                        <select id="new" name="new">
                            <option value="new" required>Yes</option>
                            <option value="existing">No</option>
                        </select>
                    </div>
                    <div class="edit-field">
                        <label for="name">Dept Name:</label><br>
                        <input type="text" id="name" name="name" value="e.g. Primary Care" required>
                    </div>
                    <div class="edit-field">
                        <label for="building">Building:</label><br>
                        <input type="text" id="building" name="building" value="e.g. Main Building" required>
                    </div>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Clear">
                </form>
            </div>
        </main>
    </body>
</html>
