<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hospital MS- Rooms</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <!--Functions: end stay, search current/past stays (w filters)-->
    <body>
        <header>
            <h1>Stay Directory</h1>
            <button class="directory-button" onclick="location.href='index.html';">Back to Home</button>
        </header>
        <main>
            <!--for beginning stays-->
            <button class="add-button" onclick="location.href='stayform.html';">Begin Stay</button>
            <div id="search-form">
                <form class="search-filter" method="post">
                    <p>Search: </p>
                    <div class="search-field">
                        <label for="stayid">Stay ID:</label><br>
                        <input type="text" id="stayid" name="stayid" placeholder="e.g. 2">
                    </div>
                    <div class="search-field">
                        <label for="ssn">Patient SSN:</label><br>
                        <input type="password" id="ssn" name="ssn">
                    </div>
                    <div class="search-field">
                        <label for="name">Patient Name:</label><br>
                        <input type="text" id="name" name="name" placeholder="e.g. John, Doe, John Doe">
                    </div>
                    <div class="search-field">
                        <label for="start">Start Date:</label><br>
                        <input type="date" id="start" name="start">
                    </div>
                    <div class="search-field">
                        <label for="end">End Date:</label><br>
                        <input type="date" id="end" name="end">
                    </div>
                    <div class="search-field">
                        <label for="provider">Care Provider Name:</label><br>
                        <input type="text" id="provider" name="provider" placeholder="e.g. John, Doe, John Doe">
                    </div>
                    <div class="search-field">
                        <label for="roomid">Room ID:</label><br>
                        <input type="text" id="roomid" name="roomid" placeholder="e.g. 2">
                    </div>
                    <div class="search-field">
                        <input type="submit" value="Search">
                        <input type="reset" value="Clear Search">
                    </div>
                </form>
            </div>
            <div id="filter-form">
                <form class="search-filter" method="post">
                    <p>Filter: </p>
                    <div class="filter-field">
                        <label for="condition">Condition:</label><br>
                        <input type="text" id="condition" name="condition" placeholder="e.g. Fever">
                    </div>  
                    <div class="filter-field">
                        <label for="ondate">Occurring on Date:</label><br>
                        <input type="date" id="ondate" name="ondate">
                    </div>
                    <div class="filter-field">
                        <label for="minLen">Minimum Length of Stay:</label><br>
                        <input type="number" id="minLen" name="minLen" min="1" max="100">
                    </div>
                    <div class="filter-field">
                        <label for="maxLen">Maximum Length of Stay:</label><br>
                        <input type="number" id="maxLen" name="maxLen" min="1" max="100">
                    </div>
                    <div class="filter-field">
                        <label for="deptName">Department Name:</label><br>
                        <input type="text" id="deptName" name="deptName" placeholder="e.g. Primary Care">
                    </div>       
                    <div class="filter-field">    
                        <input type="submit" value="Filter">
                        <input type="reset" value="Clear Filters">
                    </div>
                </form>
            </div>
            <div id="results">
                <p>Results: </p>
                <table id="results-table">
                    <tr>
                        <th>Stay ID</th>
                        <th>Patient Name</th>
                        <th>Room ID</th> 
                        <th>Main Care Provider</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Length</th>
                        <th class="bill">View Bill</th> <!--for bill button-->
                        <th class="update">Update</th> <!--for update button-->
                        <th class="update">End Stay</th> <!--for end button-->
                        <th class="delete">Delete Record</th> <!--for delete button-->
                    </tr>
                    <!--organization of a single row (to be revised when interaction is added)-->
                    <tr>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="bill"><button class="sbill-button">View Bill</button></td>
                        <td class="update"><button class="update-button" onclick="location.href='stayform.html';">Update</button></td>
                        <td class="update"><button class="update-button">End Stay</button></td>
                        <td class="delete"><button class="delete-button">Delete</button></td>
                    </tr>
                </table>
            </div>
        </main>
    </body>
</html>
